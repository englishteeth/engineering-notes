extends: default

page:
  layout: portrait
  margin: [0.75in, 0.75in, 0.85in, 0.75in]
  size: A4

base:
  font-family: Noto Serif
  font-color: #333333
  font-size: 10
  line-height-length: 14
  line-height: $base-line-height-length / $base-font-size

role:
  lead:
    font-size: 13
    font-style: italic
    font-color: #555555

title-page:
  align: left
  title:
    top: 35%
    font-size: 32
    font-style: bold
    font-color: #1a1a2e
    line-height: 1.1
  subtitle:
    font-size: 16
    font-style: italic
    font-color: #555555
    margin-top: 12
  authors:
    margin-top: 18
    font-size: 13
    font-color: #666666
  revision:
    margin-top: 6
    font-size: 10
    font-color: #999999
  logo:
    top: 10%

heading:
  font-color: #1a1a2e
  font-style: bold
  min-height-after: 2in
  h1:
    font-size: 22
    margin-top: 0
    margin-bottom: 10
  h2:
    font-size: 16
    margin-top: 14
    margin-bottom: 6
    border-bottom-width: 0.5
    border-bottom-color: #cccccc
    padding-bottom: 3
  h3:
    font-size: 12.5
    font-style: bold_italic
    margin-top: 10
    margin-bottom: 4

link:
  font-color: #2563eb

list:
  indent: $base-font-size * 1.5
  item-spacing: 4
  marker:
    font-color: #1a1a2e

description-list:
  term-font-style: bold
  term-spacing: 4
  description-indent: $base-font-size * 1.5

quote:
  font-size: $base-font-size
  font-color: #555555
  border-color: #cccccc
  border-width: 2
  padding: [0, 0, 0, 12]

sidebar:
  background-color: #f7f7f9
  border-color: #e0e0e0
  border-width: 0.5
  padding: [12, 15, 12, 15]
  title:
    font-color: #1a1a2e
    font-size: 12
    font-style: bold

admonition:
  padding: [8, 12, 8, 12]
  background-color: #f9f9fb
  border-color: #dddddd
  border-width: 0.5
  column-rule-color: #dddddd
  label:
    font-style: bold
    font-color: #1a1a2e

thematic-break:
  border-color: #e0e0e0
  border-style: solid
  border-width: 0.5
  margin-top: 8
  margin-bottom: 8

prose:
  margin-bottom: 6

header:
  height: 0.5in
  border-width: 0
  font-size: 8
  font-color: #999999
  recto: &shared_header
    right:
      content: '{document-title}'
  verso: *shared_header

footer:
  height: 0.5in
  border-width: 0
  font-size: 8
  font-color: #999999
  recto: &shared_footer
    left:
      content: 'v{revnumber} — {author}'
    right:
      content: '{page-number}'
  verso: *shared_footer

table:
  border-color: #dddddd
  border-width: 0.5
  head:
    background-color: #f2f2f5
    font-style: bold
    font-color: #1a1a2e
  body:
    stripe-background-color: #fafafa
  cell-padding: [5, 8, 5, 8]

code:
  font-family: M+ 1mn
  font-size: 9
  font-color: #333333
  background-color: #f5f5f7
  border-color: #e0e0e0
  border-width: 0.5
  padding: [8, 10, 8, 10]
  line-height: 1.3

caption:
  font-size: 9
  font-style: italic
  font-color: #777777
  margin-inside: 4
